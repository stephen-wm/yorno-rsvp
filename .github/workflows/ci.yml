name: CI

permissions:
  contents: read

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
      DIRECT_URL: ${{ secrets.CI_DIRECT_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
      BETTER_AUTH_SECRET: ci-secret-not-real
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Generate Prisma Client
        if: github.actor != 'dependabot[bot]'
        run: npm run db:generate

      - name: Generate Prisma Client (Dependabot)
        if: github.actor == 'dependabot[bot]'
        run: npx prisma generate --no-engine

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/

      - name: Format check
        run: npx prettier --check src/

      - name: Build
        run: npx next build
