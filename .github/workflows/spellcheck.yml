name: Spell Check

permissions:
  contents: read

on: [push, pull_request]

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install cspell
        run: npm install -g cspell

      - name: Cache cspell results
        uses: actions/cache@v5
        with:
          path: .cspellcache
          key: cspell-${{ runner.os }}-${{ hashFiles('**/*.md', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            cspell-${{ runner.os }}-

      - name: Run cspell
        run: npm run cspell
