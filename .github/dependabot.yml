version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      # Group all non-breaking updates into one PR
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"
      # Keep major version bumps separate — they often require code changes
      major-updates:
        update-types:
          - "major"
    ignore:
      # Never auto-bump Next.js major — requires manual migration work
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Same for React
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "ci"
